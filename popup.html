<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ももクロ スケジュール</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      min-height: 200px;
      max-height: 560px;
      overflow-y: auto;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      font-size: 13px;
      background: #fff;
      color: #333;
    }

    .header {
      background: linear-gradient(135deg, #e91e8c, #ff6b9d);
      color: #fff;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-title { font-size: 14px; font-weight: bold; }
    .header-link {
      font-size: 11px;
      color: rgba(255,255,255,0.85);
      text-decoration: none;
    }
    .header-link:hover { color: #fff; }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #fff7fb;
      border-bottom: 1px solid #f0d7e5;
      font-size: 12px;
    }
    .toggle-row input {
      width: 14px;
      height: 14px;
      accent-color: #e91e8c;
    }

    .loading {
      padding: 32px;
      text-align: center;
      color: #999;
    }
    .spinner {
      width: 24px; height: 24px;
      border: 3px solid #f3f3f3;
      border-top-color: #e91e8c;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty {
      padding: 32px;
      text-align: center;
      color: #aaa;
    }

    .error { padding: 16px; color: #c00; font-size: 12px; }

    .section-label {
      background: #f7f7f7;
      padding: 4px 12px;
      font-size: 11px;
      color: #888;
      font-weight: bold;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #eee;
    }

    .day-block { border-bottom: 1px solid #f0f0f0; }

    .day-header {
      padding: 6px 12px 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .date-str {
      font-size: 12px;
      font-weight: bold;
      color: #555;
    }

    .badge {
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
      font-weight: bold;
    }
    .badge-today { background: #e91e8c; color: #fff; }
    .badge-week  { background: #fff3cd; color: #856404; }

    .event-item {
      padding: 3px 12px 5px 20px;
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .cat {
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
      font-weight: bold;
      flex-shrink: 0;
      background: #eee;
      color: #555;
    }
    .cat-live      { background: #ffe0ef; color: #c2185b; }
    .cat-event     { background: #e3f2fd; color: #1565c0; }
    .cat-streaming { background: #f3e5f5; color: #7b1fa2; }
    .cat-tv        { background: #e8f5e9; color: #2e7d32; }
    .cat-radio     { background: #fff8e1; color: #f57f17; }
    .cat-music     { background: #fce4ec; color: #880e4f; }

    .event-title {
      font-size: 12px;
      color: #333;
      line-height: 1.4;
    }

    .footer {
      padding: 10px 12px;
      border-top: 1px solid #eee;
      text-align: center;
    }
    .footer a {
      font-size: 12px;
      color: #e91e8c;
      text-decoration: none;
      font-weight: bold;
    }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-title">🌸 ももクロ スケジュール</span>
    <a class="header-link" href="https://www.momoclo.net/schedule" target="_blank">公式サイト →</a>
  </div>
  <div class="toggle-row">
    <input type="checkbox" id="ext-enabled">
    <label for="ext-enabled">拡張機能を有効にする</label>
  </div>
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <p>取得中...</p>
    </div>
  </div>
  <div class="footer">
    <a href="https://www.momoclo.net/schedule" target="_blank">スケジュール全件を見る</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
