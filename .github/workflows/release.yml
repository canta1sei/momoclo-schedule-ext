name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create zip
        run: |
          DIR="momoclo-schedule-ext-${{ github.ref_name }}"
          mkdir "/tmp/$DIR"
          rsync -a \
            --exclude='.github' \
            --exclude='docs' \
            --exclude='.gitignore' \
            --exclude='README.md' \
            --exclude='LICENSE' \
            --exclude='.git' \
            . "/tmp/$DIR/"
          cd /tmp && zip -r "$DIR.zip" "$DIR/"
          mv "/tmp/$DIR.zip" "$GITHUB_WORKSPACE/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: momoclo-schedule-ext-${{ github.ref_name }}.zip
