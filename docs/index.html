<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ももクロ スケジュール見やすく</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      background: #0b0b10;
      color: #f8f6ff;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(120deg, #ff2b2b 0%, #ff4aa2 45%, #8f42ff 100%);
      padding: 40px 24px;
      text-align: center;
    }
    header h1 { font-size: 28px; font-weight: 900; margin-bottom: 8px; }
    header p { font-size: 14px; color: rgba(255,255,255,0.8); }
    main {
      max-width: 700px;
      margin: 48px auto;
      padding: 0 24px 64px;
    }
    .card {
      background: #141522;
      border: 1px solid #2a2d3d;
      border-radius: 14px;
      padding: 28px;
      margin-bottom: 20px;
    }
    h2 { font-size: 18px; color: #ff4aa2; margin-bottom: 12px; }
    p { color: #c7c2d6; line-height: 1.7; margin-bottom: 10px; font-size: 14px; }
    a { color: #ff4aa2; }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #ff4aa2, #8f42ff);
      color: #fff;
      font-weight: 800;
      padding: 12px 28px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 15px;
      margin-top: 8px;
    }
    .screenshots { display: flex; flex-direction: column; gap: 16px; margin-top: 16px; }
    .screenshots img {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #2a2d3d;
      display: block;
    }
    .screenshot-popup {
      width: auto !important;
      max-width: 320px;
      align-self: center;
    }
    .screenshot-label {
      font-size: 12px;
      color: #888;
      margin-top: 6px;
      text-align: center;
    }
    .screenshot-item { display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <header>
    <h1>ももクロ スケジュール見やすく</h1>
    <p>ももいろクローバーZ 公式スケジュールページを快適に</p>
  </header>
  <main>
    <div class="card">
      <h2>Chrome 拡張機能</h2>
      <p>ももいろクローバーZ 公式スケジュールページをより見やすい UI に置き換える Chrome 拡張機能です。</p>
      <p>複数月を一括取得・日付グルーピング・カレンダービュー・リマインダー通知に対応。</p>
      <a class="btn" href="https://github.com/canta1sei/momoclo-schedule-ext">GitHub で見る →</a>
    </div>
    <div class="card">
      <h2>スクリーンショット</h2>
      <div class="screenshots">
        <div class="screenshot-item">
          <img src="screenshot-list.png" alt="リストビュー">
          <p class="screenshot-label">リストビュー — 複数月を一括表示・日付グルーピング</p>
        </div>
        <div class="screenshot-item">
          <img src="screenshot-calendar.png" alt="カレンダービュー">
          <p class="screenshot-label">カレンダービュー — 月ごとの全体像をひと目で把握</p>
        </div>
        <div class="screenshot-item">
          <img src="screenshot-popup.png" alt="ポップアップ" class="screenshot-popup">
          <p class="screenshot-label">ポップアップ — アイコンクリックで直近スケジュールを確認</p>
        </div>
      </div>
    </div>
    <div class="card">
      <h2>リンク</h2>
      <p><a href="privacy-policy.html">プライバシーポリシー</a></p>
      <p><a href="https://github.com/canta1sei/momoclo-schedule-ext/issues">バグ報告・要望</a></p>
    </div>
  </main>
</body>
</html>
